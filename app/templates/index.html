<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1.0'/>
<title>InfraGPT — DevOps AI Assistant By Vaayuuu</title>
<link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800&display=swap' rel='stylesheet'/>
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'/>
<script src='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js'></script>
<style>
:root{--bg:#0d1117;--sur:#161b22;--bdr:#30363d;--acc:#00d9ff;--gr:#7ee787;--tx:#e6edf3;--mu:#8b949e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.top{background:var(--sur);border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{font-size:.65rem;color:var(--mu);}
.pill{display:flex;align-items:center;gap:6px;background:rgba(126,231,135,.1);border:1px solid rgba(126,231,135,.3);padding:4px 12px;border-radius:20px;font-size:.72rem;color:var(--gr);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.qbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:8px 20px;display:flex;gap:8px;overflow-x:auto;}
.qbar::-webkit-scrollbar{height:0}
.qp{background:transparent;border:1px solid var(--bdr);color:var(--mu);padding:4px 12px;border-radius:20px;font-size:.72rem;font-family:'JetBrains Mono',monospace;cursor:pointer;white-space:nowrap;transition:all .2s;}
.qp:hover{border-color:var(--acc);color:var(--acc);}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
.welcome{text-align:center;padding:40px 20px;}
.welcome h2{font-family:'Syne',sans-serif;font-size:1.8rem;background:linear-gradient(90deg,var(--acc),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.welcome p{color:var(--mu);font-size:.85rem;line-height:1.7;}
.wgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:480px;margin:20px auto 0;}
.wcard{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;font-size:.78rem;color:var(--mu);text-align:left;}
.wcard:hover{border-color:var(--acc);color:var(--tx);}
.wcard .wi{font-size:1.2rem;display:block;margin-bottom:5px;}
.msg{display:flex;gap:10px;animation:su .3s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.msg.user .av{background:linear-gradient(135deg,#388bfd,#58a6ff);color:#fff;}
.msg.bot .av{background:linear-gradient(135deg,var(--acc),var(--gr));color:#0d1117;font-weight:700;}
.bub{max-width:78%;padding:12px 16px;border-radius:12px;font-size:.85rem;line-height:1.7;border:1px solid var(--bdr);}
.msg.user .bub{background:#1c2128;border-top-right-radius:3px;}
.msg.bot .bub{background:var(--sur);border-top-left-radius:3px;}
.bub h1,.bub h2,.bub h3{color:var(--acc);margin:10px 0 6px;font-size:.95rem;font-family:'Syne',sans-serif;}
.bub p{margin-bottom:8px;}
.bub ul,.bub ol{padding-left:18px;margin-bottom:8px;}
.bub code:not(pre code){background:rgba(0,217,255,.1);color:var(--acc);padding:1px 6px;border-radius:4px;font-size:.8rem;}
.bub pre{background:#010409!important;border:1px solid var(--bdr);border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;position:relative;}
.bub pre code{font-size:.77rem;}
.cpbtn{position:absolute;top:8px;right:8px;background:var(--bdr);border:none;color:var(--mu);padding:2px 8px;border-radius:4px;font-size:.68rem;cursor:pointer;font-family:'JetBrains Mono',monospace;}
.cpbtn:hover{background:var(--acc);color:#0d1117;}
.bub strong{color:var(--gr);}
.bub blockquote{border-left:3px solid var(--acc);padding-left:12px;color:var(--mu);margin:8px 0;}
.typing{padding:10px 20px;display:none;}
.typing.show{display:flex;align-items:center;gap:5px;}
.typing span{width:7px;height:7px;border-radius:50%;animation:td 1.2s ease-in-out infinite;opacity:.4;}
.typing span:nth-child(1){background:var(--acc);}
.typing span:nth-child(2){background:var(--gr);animation-delay:.2s;}
.typing span:nth-child(3){background:var(--acc);animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.ibar{background:var(--sur);border-top:1px solid var(--bdr);padding:12px 16px;display:flex;gap:10px;align-items:flex-end;}
.iwrap{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:flex-end;transition:border-color .2s;}
.iwrap:focus-within{border-color:var(--acc);}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:.85rem;padding:10px 12px;resize:none;max-height:120px;line-height:1.6;}
textarea::placeholder{color:var(--mu);}
.sbtn{background:linear-gradient(135deg,var(--acc),var(--gr));border:none;color:#0d1117;width:38px;height:38px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:700;flex-shrink:0;}
.sbtn:hover{transform:scale(1.06);box-shadow:0 0 15px rgba(0,217,255,.3);}
.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
</style>
</head>
<body>
<div class='top'>
  <div style='display:flex;align-items:center;gap:12px;'>
    <div style='width:36px;height:36px;background:linear-gradient(135deg,#00d9ff,#7ee787);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;'>⚡</div>
    <div><div class='logo'>InfraGPT</div><div class='sub'>AI-Powered DevOps Assistant</div></div>
  </div>
  <div class='pill'><div class='dot'></div>Online</div>
</div>
<div class='qbar'>
  <button class='qp' onclick="qa('How do I create an EKS cluster with Terraform?')">🏗️ EKS+Terraform</button>
  <button class='qp' onclick="qa('Write a Jenkins pipeline for Docker build and DockerHub push')">⚙️ Jenkins Pipeline</button>
  <button class='qp' onclick="qa('How to debug CrashLoopBackOff in Kubernetes?')">🐛 K8s Debug</button>
  <button class='qp' onclick="qa('Best IAM security practices for AWS production?')">🔐 IAM Security</button>
  <button class='qp' onclick="qa('Set up Prometheus and Grafana monitoring on Kubernetes')">📊 Monitoring</button>
  <button class='qp' onclick="qa('Explain AWS VPC: subnets, NAT gateway, routing tables')">🌐 VPC Guide</button>
  <button class='qp' onclick="qa('How does Kubernetes HPA autoscaling work?')">☸️ HPA Scaling</button>
</div>
<div class='chat' id='chat'>
  <div class='welcome' id='welcome'>
    <h2>👋 Hey! I'm InfraGPT</h2>
    <p>AI meets DevOps. Ask me anything about  AWS, Kubernetes, Docker, Terraform,  Jenkins or any DevOps challenge!.</p>
    <div class='wgrid'>
      <div class='wcard' onclick="qa('How does Kubernetes HPA autoscaling work?')"><span class='wi'>☸️</span>K8s Autoscaling</div>
      <div class='wcard' onclick="qa('Write Terraform code for VPC with public and private subnets')"><span class='wi'>🏗️</span>Terraform IaC</div>
      <div class='wcard' onclick="qa('Set up Jenkins CI/CD pipeline with GitHub webhook trigger')"><span class='wi'>⚙️</span>Jenkins CI/CD</div>
      <div class='wcard' onclick="qa('My Docker container keeps restarting. How do I debug it?')"><span class='wi'>🐛</span>Debug Issues</div>
    </div>
  </div>
</div>
<div class='typing' id='typing'>
  <span></span><span></span><span></span>
  <span style='color:#8b949e;font-size:.75rem;margin-left:6px;'>InfraGPT is thinking...</span>
</div>
<div class='ibar'>
  <div class='iwrap'>
    <textarea id='inp' rows='1'
      placeholder='Ask anything about AWS, Docker, Kubernetes, Terraform...'
      onkeydown='hk(event)'
      oninput='rs(this)'></textarea>
  </div>
  <button class='sbtn' id='btn' onclick='send()'>➤</button>
</div>
<script>
marked.setOptions({breaks:true,gfm:true});
const chat=document.getElementById('chat');
const inp=document.getElementById('inp');
const btn=document.getElementById('btn');
const typing=document.getElementById('typing');
function rs(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function qa(t){inp.value=t;rs(inp);send();}
function addMsg(role,content){
  document.getElementById('welcome').style.display='none';
  const m=document.createElement('div');
  m.className='msg '+role;
  const av=document.createElement('div');
  av.className='av';
  av.textContent=role==='user'?'A':'⚡';
  const b=document.createElement('div');
  b.className='bub';
  if(role==='bot'){
    b.innerHTML=marked.parse(content);
    b.querySelectorAll('pre').forEach(pre=>{
      const c=document.createElement('button');
      c.className='cpbtn';c.textContent='copy';
      c.onclick=()=>{navigator.clipboard.writeText(pre.querySelector('code').innerText);
        c.textContent='✓ copied';setTimeout(()=>c.textContent='copy',1500);};
      pre.appendChild(c);
    });
    b.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
  } else {
    b.textContent=content;
  }
  m.appendChild(av);m.appendChild(b);
  chat.appendChild(m);
  chat.scrollTop=chat.scrollHeight;
}
async function send(){
  const t=inp.value.trim();
  if(!t||btn.disabled)return;
  addMsg('user',t);
  inp.value='';inp.style.height='auto';
  btn.disabled=true;
  typing.classList.add('show');
  chat.scrollTop=chat.scrollHeight;
  try{
    const r=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:t})
    });
    const d=await r.json();
    typing.classList.remove('show');
    addMsg('bot',d.reply||d.error||'Something went wrong.');
  }catch(err){
    typing.classList.remove('show');
    addMsg('bot','❌ Connection error. Is the Flask server running?');
  }
  btn.disabled=false;
  inp.focus();
}
</script>
</body>
</html>
