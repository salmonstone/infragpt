apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infragpt-ingress
  namespace: infragpt
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.infragpt.online
      secretName: infragpt-tls
  rules:
    - host: www.infragpt.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infragpt-service
                port:
                  number: 80
