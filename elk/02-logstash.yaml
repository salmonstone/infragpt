---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: logging
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    pipeline.workers: 2
 
  app-logs.conf: |
    input {
      beats { port => 5044  tags => ["app-logs"] }
    }
    filter {
      if "app-logs" in [tags] {
        grok {
          match => { "message" => [
            "%{IPORHOST:client_ip} .* \"%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER}\" %{NUMBER:status_code:int} %{NUMBER:bytes:int}",
            "\[%{TIMESTAMP_ISO8601:timestamp}\] %{LOGLEVEL:level} in %{DATA:module}: %{GREEDYDATA:msg}"
          ]}
        }
        mutate { add_field => { "service" => "infragpt-app" } }
      }
    }
    output {
      if "app-logs" in [tags] {
        elasticsearch {
          hosts => ["elasticsearch-svc:9200"]
          index => "infragpt-app-logs-%{+YYYY.MM.dd}"
        }
      }
    }
 
  k8s-logs.conf: |
    input {
      beats { port => 5045  tags => ["k8s-logs"] }
    }
    filter {
      if "k8s-logs" in [tags] {
        mutate {
          rename => {
            "[kubernetes][namespace]"        => "k8s_namespace"
            "[kubernetes][pod][name]"        => "k8s_pod"
            "[kubernetes][container][name]"  => "k8s_container"
          }
        }
        mutate { add_field => { "service" => "kubernetes" } }
      }
    }
    output {
      if "k8s-logs" in [tags] {
        elasticsearch {
          hosts => ["elasticsearch-svc:9200"]
          index => "infragpt-k8s-logs-%{k8s_namespace}-%{+YYYY.MM.dd}"
        }
      }
    }
 
  jenkins-logs.conf: |
    input {
      tcp { port => 5046  codec => json_lines  tags => ["jenkins-logs"] }
    }
    filter {
      if "jenkins-logs" in [tags] {
        mutate { add_field => { "service" => "jenkins" } }
      }
    }
    output {
      if "jenkins-logs" in [tags] {
        elasticsearch {
          hosts => ["elasticsearch-svc:9200"]
          index => "infragpt-jenkins-logs-%{+YYYY.MM.dd}"
        }
      }
    }
 
  nginx-logs.conf: |
    input {
      beats { port => 5047  tags => ["nginx-logs"] }
    }
    filter {
      if "nginx-logs" in [tags] {
        grok {
          match => { "message" => "%{IPORHOST:client_ip} .* \"%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER}\" %{NUMBER:status_code:int} %{NUMBER:bytes:int} \"%{DATA:referrer}\" \"%{DATA:ua}\"" }
        }
        mutate { add_field => { "service" => "nginx-ingress" } }
      }
    }
    output {
      if "nginx-logs" in [tags] {
        elasticsearch {
          hosts => ["elasticsearch-svc:9200"]
          index => "infragpt-nginx-logs-%{+YYYY.MM.dd}"
        }
      }
    }
 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.12.0
          ports:
            - containerPort: 5044
            - containerPort: 5045
            - containerPort: 5046
            - containerPort: 5047
            - containerPort: 9600
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "800m"
              memory: "1Gi"
          volumeMounts:
            - name: logstash-config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: logstash-config
          configMap:
            name: logstash-config
            items:
              - key: logstash.yml
                path: logstash.yml
        - name: logstash-pipeline
          configMap:
            name: logstash-config
            items:
              - key: app-logs.conf
                path: app-logs.conf
              - key: k8s-logs.conf
                path: k8s-logs.conf
              - key: jenkins-logs.conf
                path: jenkins-logs.conf
              - key: nginx-logs.conf
                path: nginx-logs.conf
 
---
apiVersion: v1
kind: Service
metadata:
  name: logstash-svc
  namespace: logging
spec:
  selector:
    app: logstash
  ports:
    - port: 5044  targetPort: 5044  name: beats-app
    - port: 5045  targetPort: 5045  name: beats-k8s
    - port: 5046  targetPort: 5046  name: tcp-jenkins
    - port: 5047  targetPort: 5047  name: beats-nginx
    - port: 9600  targetPort: 9600  name: monitoring
  type: ClusterIP
