---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: logging
 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, nodes]
    verbs: [get, watch, list]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: logging
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
 
---
# DaemonSet ConfigMap — K8s + Nginx pod logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-daemonset-config
  namespace: logging
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths: [/var/log/containers/*.log]
        tags: ["k8s-logs"]
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"
          - drop_event:
              when:
                or:
                  - contains: { kubernetes.namespace: "kube-system" }
                  - contains: { kubernetes.namespace: "logging" }
                  - contains: { kubernetes.namespace: "monitoring" }
 
    output.logstash:
      hosts: ["logstash-svc.logging.svc.cluster.local:5045"]
    logging.level: warning
 
---
# Sidecar ConfigMap — Flask/Gunicorn app logs
# Applied to infragpt namespace (used by deployment.yaml)
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-sidecar-config
  namespace: infragpt
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: log
        paths:
          - /var/log/infragpt/app.log
          - /var/log/infragpt/gunicorn-access.log
          - /var/log/infragpt/gunicorn-error.log
        tags: ["app-logs"]
        fields:
          service: infragpt-app
          environment: production
          pod_name: ${POD_NAME}
          namespace: ${POD_NAMESPACE}
        fields_under_root: true
 
    output.logstash:
      hosts: ["logstash-svc.logging.svc.cluster.local:5044"]
    logging.level: warning
 
---
# DaemonSet — runs one Filebeat pod on EVERY EKS node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: logging
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.12.0
          args: ["-c", "/etc/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: filebeat-daemonset-config
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
